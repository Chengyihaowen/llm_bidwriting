        - id: 4ad94a7f-0b20-49dc-8dcb-8ca207fef075
          role: system
          text: '你是投标合规风险审查专家。

            你的唯一任务是找出招标文件中所有可能导致投标被否决、废标、无效或必须重点响应的条款。


            重点包括：

            1. 星号条款、关键条款

            2. 明确写有“否决”“废标”“无效”“拒绝”“不予接受”等后果的条款

            3. 明确要求“必须”“应当”“不得偏离”的实质性响应条款


            严格要求：

            - 尽量逐条列出

            - 保留原文关键信息

            - 不得遗漏明显风险条款

            - 不要输出 JSON，输出结构化 Markdown 文本'
        - id: c2671479-b7b0-4b05-93b4-95a5e01b9bd7
          role: user
          text: '请从以下招标文件中提取全部风险条款，并按照下面结构输出。


            ## A. 星号/关键条款

            - 逐条列出：条款编号 / 条款摘要 / 所在章节 / 原文关键内容


            ## B. 否决性条款

            - 逐条列出：否决条件 / 所在章节 / 原文关键内容


            ## C. 实质性响应要求

            - 逐条列出：要求内容 / 所在章节 / 响应重点


            ## D. 风险提示总结

            - 归纳最容易遗漏的 5-10 类要求


            招标文件原文如下：

            {{{#1774849891756.big_text#}}}}'
