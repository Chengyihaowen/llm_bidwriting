        prompt_template:
        - id: bf8d6f62-b642-4617-b1b5-0957b35562ed
          role: system
          text: '你是一个通用招标文件解析引擎。

            你的任务是从任意行业、任意类型的招标文件中提取结构化信息。


            严格要求：

            1. 所有信息必须从招标文件原文提取

            2. 找不到的信息必须写“文件中未提及”

            3. 所有金额、日期、比例、分值、编号必须按原文保留

            4. 不允许猜测、不允许补全、不允许自行编造

            5. 输出内容用于后续标书生成和合规检查，因此必须完整、准确、可复用

            6. 输出使用清晰标题结构，不要输出 JSON，不要输出解释性前言'
        - id: 12ad1997-1766-4f5e-bfb9-a86755860541
          role: user
          text: "请完整分析以下招标文件，并按照下面结构输出。\n找不到的信息请写“文件中未提及”。\n\n## A. 项目基本信息\n- 项目名称：\n\
            - 招标编号：\n- 招标人（采购人）：\n- 招标代理机构：\n- 项目概述（一句话描述采购什么）：\n- 采购数量：\n- 交货期/工期：\n\
            - 交货地点/服务地点：\n- 资金来源：\n- 最高投标限价（如有）：\n- 投标有效期：\n- 投标保证金金额及形式：\n- 履约保证金比例及形式：\n\
            \n## B. 投标人资格要求\n- 按原文逐条列出，尽量保留编号\n\n## C. 评标办法\n- 评标方法名称：\n- 总分值：\n-\
            \ 各部分分值分配：\n  - 商务/资格部分：\n  - 技术部分：\n  - 价格/报价部分：\n- 商务/资格评分标准：\n- 技术评分标准：\n\
            - 价格评分规则：\n- 同分处理规则：\n\n## D. 技术/供货/服务要求摘要\n- 提取实质性技术要求、供货要求、服务要求、工作范围\n\
            - 尽量保留原文结构和编号\n\n## E. 商务条款要点\n- 合同类型：\n- 付款方式及比例：\n- 质保期：\n- 售后服务要求：\n\
            - 违约责任要点：\n- 知识产权归属：\n- 保密要求：\n\n## F. 偏差规定\n- 是否允许偏差：\n- 星号/关键条款偏差规定：\n\
            - 非星号条款负偏差限制：\n- 偏差定义范围：\n\n## G. 其他对标书撰写有直接影响的要求\n- 例如签章要求、附件要求、响应格式要求、编制要求等\n\
            \n招标文件原文如下：\n{{{{#1774849891756.big_text#}}}}"
